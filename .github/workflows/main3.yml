name: VPS (tmate + Docker)
on: [workflow_dispatch]

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: vps
      cancel-in-progress: true

    steps:
      # 1️⃣ NUKE CONFLICTING UBUNTU PACKAGES FIRST
      - name: 🧹 Remove conflicting containerd (Ubuntu default)
        run: |
          sudo apt-get remove -y containerd containerd.io docker.io docker-doc docker-compose docker-compose-v2 podman-docker runc 2>/dev/null || true
          sudo apt-get autoremove -y

      # 2️⃣ INSTALL DOCKER VIA OFFICIAL SCRIPT (handles repos, keys, containerd.io, plugins)
      - name: 🐳 Install Docker (official script)
        run: |
          curl -fsSL https://get.docker.com | sudo sh
          # Verify
          docker version

      # 3️⃣ INSTALL YOUR TOOLBOX
      - name: 🛠️ Install Tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y tmux htop curl wget git vim unzip jq

      # 4️⃣ WRITE TMATE STARTUP SCRIPT (safe, no YAML heredoc issues)
      - name: 📝 Write tmate Startup Script
        run: |
          cat > /tmp/tmate_start.sh << 'EOF'
          #!/bin/bash
          cd /home/runner/workspace
          tmux new-session -d -s vps 2>/dev/null || true
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║     🖥️  VPS READY — SSH CONNECTED     ║"
          echo "╠══════════════════════════════════════╣"
          echo "║  Docker:  $(docker --version)        ║"
          echo "║  tmux:    session 'vps'               ║"
          echo "║  Dir:     $(pwd)                      ║"
          echo "║  Timeout: 6 hours                     ║"
          echo "╚══════════════════════════════════════╝"
          echo ""
          exec tmux attach -t vps
          EOF
          chmod +x /tmp/tmate_start.sh

      # 5️⃣ LAUNCH TMATE
      - name: 🔐 Start tmate Session
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 360
        with:
          limit-access-to-actor: true
          detached: true
          wait-for-connection: 3600
          before-script: bash /tmp/tmate_start.sh
